<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Wig Repair Business Manager</title>
<style>
  :root {
    --ivory: #FAF8F4;
    --ivory-dark: #F2EDE6;
    --ivory-border: #E6DDD4;
    --espresso: #1C1410;
    --espresso-mid: #4A3728;
    --espresso-light: #8C6B58;
    --rose: #C4748A;
    --rose-light: #F2E0E5;
    --rose-dark: #9A4F66;
    --sage: #7A9E87;
    --sage-light: #E4EFE7;
    --sage-dark: #4E7A5C;
    --amber: #C49A4A;
    --amber-light: #FDF3DF;
    --amber-dark: #8A6A28;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(28,20,16,.08), 0 4px 16px rgba(28,20,16,.06);
    --shadow-sm: 0 1px 3px rgba(28,20,16,.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--ivory);
    color: var(--espresso);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }
  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px; min-height: 100vh; background: var(--espresso);
    display: flex; flex-direction: column; padding: 0; flex-shrink: 0;
    position: sticky; top: 0; height: 100vh;
  }
  .sidebar-brand {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .sidebar-brand .brand-name {
    font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -.2px;
  }
  .sidebar-brand .brand-sub {
    font-size: 11px; color: rgba(255,255,255,.4); margin-top: 2px; letter-spacing: .04em; text-transform: uppercase;
  }
  .sidebar-nav { padding: 12px 10px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border-radius: 8px; cursor: pointer; margin-bottom: 2px;
    color: rgba(255,255,255,.55); font-size: 14px; font-weight: 500;
    transition: background .15s, color .15s; user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.85); }
  .nav-item.active { background: var(--rose); color: #fff; }
  .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; }
  .sidebar-footer {
    padding: 16px; border-top: 1px solid rgba(255,255,255,.08);
    font-size: 12px; color: rgba(255,255,255,.3);
  }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .topbar {
    background: var(--ivory); border-bottom: 1px solid var(--ivory-border);
    padding: 14px 28px; display: flex; align-items: center;
    justify-content: space-between; gap: 16px; flex-shrink: 0;
  }
  .topbar-title { font-size: 20px; font-weight: 600; letter-spacing: -.3px; }
  .topbar-actions { display: flex; gap: 8px; }
  .content { padding: 24px 28px; flex: 1; overflow-y: auto; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1.5px solid transparent; transition: all .15s; white-space: nowrap;
  }
  .btn-primary { background: var(--rose); color: #fff; border-color: var(--rose); }
  .btn-primary:hover { background: var(--rose-dark); border-color: var(--rose-dark); }
  .btn-ghost { background: transparent; color: var(--espresso-mid); border-color: var(--ivory-border); }
  .btn-ghost:hover { background: var(--ivory-dark); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn svg { width: 14px; height: 14px; }

  /* Cards */
  .card {
    background: #fff; border: 1px solid var(--ivory-border);
    border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow-sm);
  }
  .card-sm { padding: 14px 16px; }

  /* Grid */
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  /* Stat cards */
  .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--espresso-light); margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -.5px; color: var(--espresso); }
  .stat-sub { font-size: 12px; color: var(--espresso-light); margin-top: 4px; }
  .stat-positive { color: var(--sage-dark); }
  .stat-warning { color: var(--amber-dark); }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; padding: 2px 8px;
    border-radius: 20px; font-size: 11px; font-weight: 600;
    letter-spacing: .02em;
  }
  .badge-rose { background: var(--rose-light); color: var(--rose-dark); }
  .badge-sage { background: var(--sage-light); color: var(--sage-dark); }
  .badge-amber { background: var(--amber-light); color: var(--amber-dark); }
  .badge-gray { background: var(--ivory-dark); color: var(--espresso-mid); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .06em; color: var(--espresso-light);
    padding: 10px 12px; border-bottom: 1.5px solid var(--ivory-border);
    white-space: nowrap;
  }
  td { padding: 11px 12px; border-bottom: 1px solid var(--ivory-border); font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--ivory); }
  .td-primary { font-weight: 500; color: var(--espresso); }
  .td-muted { color: var(--espresso-light); }

  /* Form */
  .form-grid { display: grid; gap: 14px; }
  .form-grid-2 { grid-template-columns: 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 12px; font-weight: 600; color: var(--espresso-mid); letter-spacing: .02em; }
  input, select, textarea {
    border: 1.5px solid var(--ivory-border); border-radius: var(--radius-sm);
    padding: 9px 12px; font-size: 14px; color: var(--espresso);
    background: #fff; font-family: inherit; transition: border-color .15s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--rose); }
  textarea { resize: vertical; min-height: 80px; }
  .form-hint { font-size: 11px; color: var(--espresso-light); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(28,20,16,.45);
    display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .modal {
    background: #fff; border-radius: 16px; width: 100%; max-width: 520px;
    box-shadow: 0 8px 40px rgba(0,0,0,.18); max-height: 90vh; overflow-y: auto;
  }
  .modal-header {
    padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-title { font-size: 18px; font-weight: 600; letter-spacing: -.2px; }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 0 24px 20px; display: flex; justify-content: flex-end; gap: 8px; }
  .close-btn {
    background: none; border: none; cursor: pointer; color: var(--espresso-light);
    padding: 4px; border-radius: 6px; display: flex;
  }
  .close-btn:hover { color: var(--espresso); background: var(--ivory-dark); }

  /* Urgency strip */
  .urgency-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 14px;
    background: #fff; border-radius: var(--radius-sm); border: 1px solid var(--ivory-border);
    margin-bottom: 8px; cursor: pointer; transition: box-shadow .15s;
  }
  .urgency-item:hover { box-shadow: var(--shadow); }
  .urgency-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-rose { background: var(--rose); }
  .dot-amber { background: var(--amber); }
  .dot-sage { background: var(--sage); }
  .urgency-label { font-size: 13px; font-weight: 500; color: var(--espresso); flex: 1; }
  .urgency-meta { font-size: 12px; color: var(--espresso-light); }

  /* Section spacing */
  .section-title { font-size: 14px; font-weight: 600; color: var(--espresso-mid); margin-bottom: 12px; }
  .gap-16 { display: flex; flex-direction: column; gap: 16px; }
  .gap-24 { display: flex; flex-direction: column; gap: 24px; }

  /* Quick action bar */
  .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .quick-btn {
    display: flex; align-items: center; gap: 8px; padding: 10px 16px;
    background: #fff; border: 1.5px solid var(--ivory-border);
    border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
    font-weight: 500; color: var(--espresso-mid); transition: all .15s;
    box-shadow: var(--shadow-sm);
  }
  .quick-btn:hover { border-color: var(--rose); color: var(--rose); }
  .quick-btn svg { width: 16px; height: 16px; color: var(--rose); }

  /* Empty state */
  .empty { text-align: center; padding: 48px 24px; color: var(--espresso-light); }
  .empty svg { margin: 0 auto 12px; display: block; opacity: .3; }
  .empty p { font-size: 14px; margin-bottom: 16px; }

  /* Progress bar */
  .progress-bar { background: var(--ivory-dark); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width .3s; }

  /* Divider */
  .divider { height: 1px; background: var(--ivory-border); margin: 20px 0; }

  /* Mobile */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .content { padding: 16px; }
    .topbar { padding: 12px 16px; }
    .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .form-grid-2 { grid-template-columns: 1fr; }
  }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: var(--ivory-dark); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px; }
  .tab {
    flex: 1; padding: 7px 12px; text-align: center; border-radius: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer; color: var(--espresso-light);
    transition: all .15s; background: transparent; border: none;
  }
  .tab.active { background: #fff; color: var(--espresso); box-shadow: var(--shadow-sm); }

  /* Color dot for client */
  .client-avatar {
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0;
  }

  /* Tag */
  .tag {
    display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
    border-radius: 6px; font-size: 11px; font-weight: 500;
    background: var(--ivory-dark); color: var(--espresso-mid);
  }

  /* Notification dot */
  .notif-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--rose);
    position: absolute; top: 6px; right: 6px;
  }

  /* Chart bar */
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 80px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .bar { border-radius: 4px 4px 0 0; width: 100%; background: var(--rose); opacity: .7; transition: opacity .15s; }
  .bar:hover { opacity: 1; }
  .bar-label { font-size: 10px; color: var(--espresso-light); }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">✦ Studio</div>
      <div class="brand-sub">Wig Repair Manager</div>
    </div>
    <div class="sidebar-nav" id="nav"></div>
    <div class="sidebar-footer">v1.0 · Your Business</div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Modal container -->
<div id="modal-root"></div>

<script>
// ============================================================
// DATA STORE
// ============================================================
const DB = {
  clients: [
    { id: 1, name: 'Miriam Cohen', phone: '917-555-0182', email: 'miriam@email.com', source: 'Instagram', notes: 'Prefers silk base wigs. Sensitive scalp.', color: '#C4748A', totalSpent: 480, jobs: 3 },
    { id: 2, name: 'Sandra Williams', phone: '646-555-0234', email: 'sandra@email.com', source: 'Referral', notes: 'Wig is human hair blend, uses sulfate-free products.', color: '#7A9E87', totalSpent: 210, jobs: 2 },
    { id: 3, name: 'Rachel Levy', phone: '718-555-0399', email: 'rlevy@email.com', source: 'Word of mouth', notes: 'Has 3 wigs in rotation. Very detail-oriented.', color: '#C49A4A', totalSpent: 650, jobs: 5 },
  ],
  jobs: [
    { id: 1, clientId: 1, clientName: 'Miriam Cohen', type: 'Deep condition + style', status: 'in-progress', received: '2025-06-08', dueDate: '2025-06-12', price: 120, paid: false, notes: 'Detangle first, some matting at nape' },
    { id: 2, clientId: 3, clientName: 'Rachel Levy', type: 'Full repair — weft re-sewing', status: 'ready', received: '2025-06-05', dueDate: '2025-06-10', price: 180, paid: false, notes: 'Left side weft coming loose' },
    { id: 3, clientId: 2, clientName: 'Sandra Williams', type: 'Color refresh', status: 'received', received: '2025-06-09', dueDate: '2025-06-14', price: 95, paid: false, notes: 'Wants roots touched up only' },
    { id: 4, clientId: 1, clientName: 'Miriam Cohen', type: 'Style only', status: 'complete', received: '2025-05-28', dueDate: '2025-06-01', price: 85, paid: true, notes: '' },
    { id: 5, clientId: 3, clientName: 'Rachel Levy', type: 'Detangle + wash', status: 'complete', received: '2025-05-20', dueDate: '2025-05-22', price: 75, paid: true, notes: '' },
  ],
  transactions: [
    { id: 1, date: '2025-06-01', type: 'income', category: 'Services', description: 'Style only – Miriam Cohen', amount: 85 },
    { id: 2, date: '2025-05-22', type: 'income', category: 'Services', description: 'Detangle + wash – Rachel Levy', amount: 75 },
    { id: 3, date: '2025-05-18', type: 'expense', category: 'Supplies', description: 'Silk gloves, adhesive remover, detangle spray', amount: 47 },
    { id: 4, date: '2025-05-15', type: 'expense', category: 'Marketing', description: 'Instagram Boost – 3 days', amount: 25 },
    { id: 5, date: '2025-05-10', type: 'income', category: 'Services', description: 'Full repair – Rachel Levy', amount: 180 },
    { id: 6, date: '2025-05-05', type: 'expense', category: 'Supplies', description: 'Needle & thread set, wig stand', amount: 38 },
    { id: 7, date: '2025-04-28', type: 'income', category: 'Services', description: 'Deep condition – Sandra Williams', amount: 110 },
  ],
  supplies: [
    { id: 1, name: 'Detangle spray', qty: 2, unit: 'bottles', reorderAt: 1, cost: 12 },
    { id: 2, name: 'Silk gloves', qty: 8, unit: 'pairs', reorderAt: 3, cost: 4 },
    { id: 3, name: 'Adhesive remover', qty: 1, unit: 'bottles', reorderAt: 2, cost: 18 },
    { id: 4, name: 'Weft thread (black)', qty: 3, unit: 'spools', reorderAt: 2, cost: 6 },
    { id: 5, name: 'Wig stands', qty: 5, unit: 'units', reorderAt: 2, cost: 9 },
  ],
  marketing: [
    { id: 1, date: '2025-06-01', channel: 'Instagram', type: 'Post', notes: 'Before/after — Rachel styling', leads: 2 },
    { id: 2, date: '2025-05-20', channel: 'Referral', type: 'Word of mouth', notes: 'Sandra referred her cousin', leads: 1 },
    { id: 3, date: '2025-05-15', channel: 'Instagram', type: 'Paid boost', notes: 'Boosted for 3 days, $25', leads: 4 },
    { id: 4, date: '2025-05-01', channel: 'Facebook', type: 'Post', notes: 'Launch announcement post', leads: 1 },
  ],
  nextId: { clients: 4, jobs: 6, transactions: 8, supplies: 6, marketing: 5 }
};

// ============================================================
// NAVIGATION
// ============================================================
const PAGES = [
  { id: 'dashboard', label: 'Dashboard', icon: iconGrid },
  { id: 'clients', label: 'Clients', icon: iconUsers },
  { id: 'jobs', label: 'Jobs', icon: iconScissors },
  { id: 'finance', label: 'Finance', icon: iconDollar },
  { id: 'supplies', label: 'Supplies', icon: iconBox },
  { id: 'marketing', label: 'Marketing', icon: iconMegaphone },
];

let currentPage = 'dashboard';

function render() {
  renderNav();
  renderPage(currentPage);
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = PAGES.map(p => `
    <div class="nav-item ${currentPage === p.id ? 'active' : ''}" onclick="navigate('${p.id}')">
      ${p.icon()} ${p.label}
    </div>
  `).join('');
}

function navigate(pageId) {
  currentPage = pageId;
  renderNav();
  renderPage(pageId);
}

function renderPage(pageId) {
  const titleEl = document.getElementById('page-title');
  const actionsEl = document.getElementById('topbar-actions');
  const contentEl = document.getElementById('content');

  const page = PAGES.find(p => p.id === pageId);
  titleEl.textContent = page.label;

  const pages = {
    dashboard: renderDashboard,
    clients: renderClients,
    jobs: renderJobs,
    finance: renderFinance,
    supplies: renderSupplies,
    marketing: renderMarketing,
  };

  actionsEl.innerHTML = '';
  contentEl.innerHTML = '';
  pages[pageId]();
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const actionsEl = document.getElementById('topbar-actions');
  actionsEl.innerHTML = `<span style="font-size:13px;color:var(--espresso-light)">June 2025</span>`;

  const income = DB.transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expenses = DB.transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const unpaidJobs = DB.jobs.filter(j => !j.paid && j.status !== 'complete');
  const unpaidTotal = unpaidJobs.reduce((s, j) => s + j.price, 0);
  const activeJobs = DB.jobs.filter(j => j.status !== 'complete').length;
  const lowSupplies = DB.supplies.filter(s => s.qty <= s.reorderAt);
  const readyJobs = DB.jobs.filter(j => j.status === 'ready');

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="gap-24">
      <!-- Stats row -->
      <div class="grid-4">
        <div class="card">
          <div class="stat-label">Total earned</div>
          <div class="stat-value">$${income}</div>
          <div class="stat-sub stat-positive">↑ All time</div>
        </div>
        <div class="card">
          <div class="stat-label">Outstanding</div>
          <div class="stat-value" style="color:var(--rose)">$${unpaidTotal}</div>
          <div class="stat-sub">${unpaidJobs.length} job${unpaidJobs.length !== 1 ? 's' : ''} unpaid</div>
        </div>
        <div class="card">
          <div class="stat-label">Active jobs</div>
          <div class="stat-value">${activeJobs}</div>
          <div class="stat-sub">${readyJobs.length} ready for pickup</div>
        </div>
        <div class="card">
          <div class="stat-label">Clients</div>
          <div class="stat-value">${DB.clients.length}</div>
          <div class="stat-sub">Total in system</div>
        </div>
      </div>

      <!-- Urgent + Mini chart -->
      <div class="grid-2">
        <div>
          <div class="section-title">Needs attention</div>
          ${readyJobs.length === 0 && lowSupplies.length === 0 && unpaidJobs.length === 0
            ? `<div class="card card-sm" style="text-align:center;color:var(--espresso-light);font-size:13px;padding:20px">All clear — nothing urgent right now 🎉</div>`
            : `
            ${readyJobs.map(j => `
              <div class="urgency-item" onclick="navigate('jobs')">
                <div class="urgency-dot dot-rose"></div>
                <div class="urgency-label">${j.clientName} — ready for pickup</div>
                <div class="urgency-meta">${j.type}</div>
              </div>`).join('')}
            ${unpaidJobs.filter(j => j.status === 'complete' || j.status === 'ready').map(j => `
              <div class="urgency-item" onclick="navigate('finance')">
                <div class="urgency-dot dot-amber"></div>
                <div class="urgency-label">Invoice $${j.price} — ${j.clientName}</div>
                <div class="urgency-meta">Unpaid</div>
              </div>`).join('')}
            ${lowSupplies.map(s => `
              <div class="urgency-item" onclick="navigate('supplies')">
                <div class="urgency-dot dot-amber"></div>
                <div class="urgency-label">Low: ${s.name}</div>
                <div class="urgency-meta">${s.qty} ${s.unit} left</div>
              </div>`).join('')}
          `}
        </div>

        <div>
          <div class="section-title">Income this month</div>
          <div class="card" style="padding:16px 20px">
            <div class="bar-chart" id="mini-chart"></div>
            <div style="margin-top:14px;display:flex;gap:16px">
              <div>
                <div style="font-size:11px;color:var(--espresso-light);font-weight:600;text-transform:uppercase;letter-spacing:.06em">Income</div>
                <div style="font-size:20px;font-weight:700;color:var(--sage-dark)">$${income}</div>
              </div>
              <div>
                <div style="font-size:11px;color:var(--espresso-light);font-weight:600;text-transform:uppercase;letter-spacing:.06em">Expenses</div>
                <div style="font-size:20px;font-weight:700;color:var(--rose)">$${expenses}</div>
              </div>
              <div>
                <div style="font-size:11px;color:var(--espresso-light);font-weight:600;text-transform:uppercase;letter-spacing:.06em">Profit</div>
                <div style="font-size:20px;font-weight:700;color:var(--espresso)">${income - expenses >= 0 ? '+' : ''}$${income - expenses}</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Recent jobs -->
      <div>
        <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
          Recent jobs
          <button class="btn btn-ghost btn-sm" onclick="navigate('jobs')">See all</button>
        </div>
        <div class="card" style="padding:0">
          <div class="table-wrap">

                <th>Date</th><th>Description</th><th>Category</th><th>Type</th><th style="text-align:right">Amount</th>

function openModal(html) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay" onclick="closeModalOnOverlay(event)">${html}</div>`;
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

function closeModalOnOverlay(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal();
}

function openNewClientModal() {
  openModal(`
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">New client</div>
        <button class="close-btn" onclick="closeModal()">${iconX()}</button>
      </div>
      <div class="modal-body">
        <div class="form-grid form-grid-2">
          <div class="form-group" style="grid-column:1/-1"><label>Full name *</label><input id="c-name" placeholder="e.g. Miriam Cohen"></div>
          <div class="form-group"><label>Phone</label><input id="c-phone" placeholder="917-555-0000"></div>
          <div class="form-group"><label>Email</label><input id="c-email" type="email" placeholder="email@example.com"></div>
          <div class="form-group"><label>How did she find you?</label>
            <select id="c-source">
              <option>Instagram</option><option>Referral</option><option>Word of mouth</option>
              <option>Facebook</option><option>Google</option><option>Other</option>
            </select>
          </div>
          <div class="form-group"><label>Wig notes</label><textarea id="c-notes" placeholder="Hair type, sensitivities, preferences..."></textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>

function saveClient() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) { alert('Please enter a name.'); return; }
  const colors = ['#C4748A','#7A9E87','#C49A4A','#7A87C4','#C4907A','#87A47A'];
  DB.clients.push({
    id: DB.nextId.clients++,
    name,
    phone: document.getElementById('c-phone').value,
    email: document.getElementById('c-email').value,
    source: document.getElementById('c-source').value,
    notes: document.getElementById('c-notes').value,
    color: colors[DB.clients.length % colors.length],
    totalSpent: 0, jobs: 0
  });
  closeModal();
  renderPage('clients');

  openModal(`

        <button class="close-btn" onclick="closeModal()">${iconX()}</button>

          </div>
          <div class="form-group" style="grid-column:1/-1"><label>Service type *</label>

        <button class="btn btn-primary" onclick="saveJob()">Add job</button>

  `);

function saveJob() {
  const clientId = parseInt(document.getElementById('j-client').value);
  const type = document.getElementById('j-type').value.trim();
  const price = parseFloat(document.getElementById('j-price').value);
  if (!type || !price) { alert('Please fill in service and price.'); return; }
  const client = DB.clients.find(c => c.id === clientId);
  const today = new Date().toISOString().split('T')[0];
  DB.jobs.push({
    id: DB.nextId.jobs++, clientId, clientName: client.name,
    type, status: 'received',
    received: today,
    dueDate: document.getElementById('j-due').value || today,
    price, paid: false,
    notes: document.getElementById('j-notes').value
  });
  closeModal();
  renderPage('jobs');
}

      </div>
    </div>
  `);
}

function saveSupply() {
  const name = document.getElementById('s-name').value.trim();
  if (!name) { alert('Please enter item name.'); return; }
  DB.supplies.push({
    id: DB.nextId.supplies++, name,
    qty: parseInt(document.getElementById('s-qty').value)||1,
    unit: document.getElementById('s-unit').value||'units',
    reorderAt: parseInt(document.getElementById('s-reorder').value)||2,
    cost: parseFloat(document.getElementById('s-cost').value)||0
  });
  closeModal();
  renderPage('supplies');
}

function openClientDetail(id) {

  const jobs = DB.jobs.filter(j => j.clientId === id);
  openModal(`
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title">${c.name}</div>
          <div style="font-size:13px;color:var(--espresso-light);margin-top:2px">${c.phone} · ${c.email || 'No email'}</div>
        </div>
        <button class="close-btn" onclick="closeModal()">${iconX()}</button>

      <div class="modal-body">

          <div class="card card-sm" style="flex:1;text-align:center"><div class="stat-label">Source</div><div style="font-size:13px;font-weight:600;margin-top:4px">${c.source}</div></div>
        </div>
        ${c.notes ? `<div style="background:var(--ivory-dark);border-radius:var(--radius-sm);padding:12px;font-size:13px;margin-bottom:16px;color:var(--espresso-mid)">${c.notes}</div>` : ''}

        ${jobs.length === 0 
          ? `<div style="font-size:13px;color:var(--espresso-light);text-align:center;padding:16px 0">No jobs yet</div>`
          : jobs.map(j => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--ivory-border)">

                <div style="font-size:13px;font-weight:500">${j.type}</div>
                <div style="font-size:12px;color:var(--espresso-light)">${formatDate(j.dueDate)}</div>

function openJobDetail(id) {
  const j = DB.jobs.find(x => x.id === id);
  const statuses = ['received','in-progress','ready','complete'];
  openModal(`
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title">${j.clientName}</div>
          <div style="font-size:13px;color:var(--espresso-light);margin-top:2px">${j.type}</div>
        </div>
        <button class="close-btn" onclick="closeModal()">${iconX()}</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
          <div class="card card-sm" style="flex:1;min-width:80px;text-align:center"><div class="stat-label">Price</div><div style="font-weight:700;font-size:22px">$${j.price}</div></div>
          <div class="card card-sm" style="flex:1;min-width:80px;text-align:center"><div class="stat-label">Due</div><div style="font-weight:700;font-size:14px;margin-top:4px">${formatDate(j.dueDate)}</div></div>
          <div class="card card-sm" style="flex:1;min-width:80px;text-align:center"><div class="stat-label">Paid</div><div style="font-size:18px;margin-top:4px">${j.paid ? '✅' : '❌'}</div></div>
        </div>
        ${j.notes ? `<div style="background:var(--ivory-dark);border-radius:var(--radius-sm);padding:12px;font-size:13px;margin-bottom:16px;color:var(--espresso-mid)">${j.notes}</div>` : ''}
        <div style="font-weight:600;font-size:13px;margin-bottom:10px">Update status</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${statuses.map(s => `
            <button class="btn ${j.status===s?'btn-primary':'btn-ghost'}" onclick="updateJobStatus(${j.id},'${s}')">${statusLabel(s)}</button>
          `).join('')}
        </div>
        ${!j.paid ? `
          <div class="divider"></div>
          <button class="btn btn-primary" onclick="markPaid(${j.id})" style="width:100%">Mark as paid</button>
        ` : ''}
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      </div>
    </div>
  `);
}

// ============================================================
// ACTIONS
// ============================================================
function markPaid(jobId) {
  const j = DB.jobs.find(x => x.id === jobId);
  if (j) {
    j.paid = true;
    j.status = 'complete';
    const client = DB.clients.find(c => c.id === j.clientId);
    if (client) { client.totalSpent += j.price; }
    DB.transactions.push({
      id: DB.nextId.transactions++,
      date: new Date().toISOString().split('T')[0],
      type: 'income',
      category: 'Services',
      description: `${j.type} — ${j.clientName}`,
      amount: j.price
    });
  }
  closeModal();
  renderPage(currentPage);
}

function updateJobStatus(jobId, status) {
  const j = DB.jobs.find(x => x.id === jobId);
  if (j) j.status = status;
  closeModal();
  renderPage('jobs');
}

function adjustQty(id, delta) {
  const s = DB.supplies.find(x => x.id === id);
  if (s) { s.qty = Math.max(0, s.qty + delta); }
  renderPage('supplies');
}

// ============================================================
// HELPERS
// ============================================================
function formatDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(day)}`;
}

function jobBadge(status) {
  const map = {
    'received': ['badge-gray','Received'],
    'in-progress': ['badge-amber','In progress'],
    'ready': ['badge-rose','Ready'],
    'complete': ['badge-sage','Complete'],
  };
  const [cls, label] = map[status] || ['badge-gray', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

function statusLabel(s) {
  return { 'received':'Received','in-progress':'In progress','ready':'Ready','complete':'Complete' }[s] || s;
}
